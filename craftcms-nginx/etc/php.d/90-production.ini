; Production-only PHP hardening.
; Copied into the image ONLY by the `prod` build target (see Dockerfile).
; Loaded after 60-craftcms.ini, so values here win.

; Restrict filesystem access to the app, temp, and the few /dev files PHP needs.
; If a plugin legitimately needs another path, extend this list.
open_basedir = "/app:/tmp:/dev/stdout:/dev/urandom"

; Don't advertise PHP via the X-Powered-By header.
expose_php = Off

; Belt-and-suspenders: opcache should not re-check timestamps in prod.
; (Also set via PHP_OPCACHE_VALIDATE_TIMESTAMPS=0 in the prod stage.)
opcache.validate_timestamps = 0
opcache.enable_cli = 0
